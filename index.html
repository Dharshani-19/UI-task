<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <header class="head"><b><span class="one">TASK</span><span class="two"> MANAGER</span></b></header>
    <div class="input"><input id="search" class="search" type="search" placeholder="Search here..." /></div>
    <br>

    <div class="card-container">
        <div class="card">
            <div>
                <img class="img" src="img1.jpg">
                <h4 class="text">Enter the task to added:</h4>
                <textarea class="task" id="taskInput" cols="20" rows="2"></textarea><br>
                <select class="select" id="options1">
                <option value="" disabled selected>Select an Task Status</option>
                <option value="true">Completed</option>
                <option value="false">Pending</option>
            </select><br><br>
                <button id="addTaskBtn" onclick="table()" class="addTaskBtn" type="submit">Add Task</button>
            </div>
            <br><select class="select" id="options">
                <option value="" disabled selected>Select an option</option>
                <option value="all">All</option>
                <option value="complete">Completed</option>
                <option value="pending">Pending</option>
            </select>
        </div>
        <br>
        <table class="table" id="table">
            <tr>
                <th>Task Name</th>
                <th>Task Status</th>
                <th>Actions</th>
            </tr>
        </table>


        <div id="contain" class="contain">

        </div>
    </div>

    <script src="initial.js"></script>
</body>

</html>
